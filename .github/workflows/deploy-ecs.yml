name: Deploy To ECS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - ".env.production"
      - "index.html"
      - "vite.config.js"
      - "vite.config.mjs"
      - "backend/**"
      - "src/**"
      - "public/**"

permissions:
  contents: read

concurrency:
  group: deploy-ecs-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      ECR_REPOSITORY: shoe-store
      ECS_CLUSTER: shoe-store
      ECS_SERVICE: shoe-store

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Validate backend lockfile exists
        run: |
          if [ ! -f backend/package-lock.json ]; then
            echo "backend/package-lock.json is missing. Commit lockfile so Docker npm ci can run."
            exit 1
          fi

      - name: Build and push latest image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            --push .

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION" \
            --no-cli-pager

      - name: Wait for service to become stable
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION"

      - name: Show final service status
        run: |
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[0].{status:status,running:runningCount,desired:desiredCount,primary:deployments[?status==`PRIMARY`]|[0].rolloutState}'
